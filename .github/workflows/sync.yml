name: Notion to Obsidian Auto-Sync

on:
  schedule:
    - cron: '0 */3 * * *'  # Runs every 3 hours
  workflow_dispatch:        # Allows manual trigger anytime from GitHub UI

permissions:
  contents: write           # Grants GitHub Actions permission to push commits to your repo

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check Start Date Guard
        run: |
          CURRENT_SEC=$(date +%s)
          START_SEC=$(date -d "2026-09-07" +%s)

          if [ "$CURRENT_SEC" -lt "$START_SEC" ]; then
            echo "Current date is before September 7, 2026. Skipping sync."
            exit 0
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests python-dotenv

      - name: Run Automation Script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_LAB_DB_ID: ${{ secrets.NOTION_LAB_DB_ID }}
          NOTION_RESEARCH_DB_ID: ${{ secrets.NOTION_RESEARCH_DB_ID }}
          OBSIDIAN_BASE_DIR: "."
        run: python automation.py

      - name: Commit and Push New Notes to Repo
        run: |
          git config --global user.name "NotionSyncBot"
          git config --global user.email "bot@github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-synced new notes from Notion" && git push)
